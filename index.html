<!doctype html>
<!-- =====================================================================
     EPBC PING — application (PWA)
     ⚠️ NE MODIFIEZ PAS CE FICHIER pour changer le contenu :
        tout le contenu (textes, images, liens, couleurs) se règle
        dans le fichier « config.js ».
     ===================================================================== -->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EPBC Ping</title>
<meta name="description" content="Accès rapide au club de tennis de table EPBC — Belleville / Lancié.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#C51A1F" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EPBC Ping">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C51A1F; --ink:#051115; --paper:#FFFFFF;
    --surface:#F5F2EF; --line:#E7E1DB; --muted:#5C5B58;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Hanken Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink); background:var(--surface);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding:0 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px 40px}
  a{color:inherit}
  h1,h2,.eyebrow{font-family:"Archivo",system-ui,sans-serif}

  .hero{position:relative;overflow:hidden;background:var(--paper);
    border-bottom:3px solid var(--ink);padding:26px 16px 22px}
  .streaks{position:absolute;inset:0;pointer-events:none;overflow:hidden}
  .streaks i{position:absolute;right:-40px;height:12px;background:var(--red);
    border-radius:8px;transform:skewX(-24deg);opacity:.16}
  .streaks i:nth-child(1){top:26px;width:210px}
  .streaks i:nth-child(2){top:52px;width:150px;opacity:.11}
  .streaks i:nth-child(3){top:78px;width:96px;opacity:.08}
  .hero-inner{position:relative;max-width:520px;margin:0 auto;
    display:flex;flex-direction:column;align-items:center;text-align:center}
  .banner{width:100%;height:auto;display:block;border-radius:12px}

  section{margin-top:22px}
  .lbl{font-family:"Archivo",sans-serif;font-size:.72rem;font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    margin:0 0 10px;display:flex;align-items:center;gap:10px}
  .lbl::after{content:"";flex:1;height:1px;background:var(--line)}

  /* --- Pavé « À la une » (avec image optionnelle) --- */
  .flash{display:block;background:var(--ink);color:#fff;border-radius:16px;
    overflow:hidden;text-decoration:none}
  .flash-img{width:100%;height:170px;object-fit:cover;display:block}
  .flash-body{display:flex;gap:14px;align-items:center;padding:16px 18px}
  .flash .date{font-family:"Archivo",sans-serif;font-weight:800;font-size:1.5rem;
    line-height:.95;color:#fff;text-align:center;min-width:56px}
  .flash .date small{display:block;font-size:.62rem;letter-spacing:.14em;
    font-weight:700;color:var(--red);text-transform:uppercase;margin-top:4px}
  .flash .txt strong{display:block;font-size:1rem}
  .flash .txt span{font-size:.86rem;color:#cfcecb}

  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .tile{display:flex;flex-direction:row;align-items:center;justify-content:space-between;
    background:var(--paper);border:1px solid var(--line);border-radius:16px;
    padding:15px 14px;min-height:auto;text-decoration:none;min-width:0}
  .tile:active{border-color:var(--red)}
  .tile .t{font-family:"Archivo",sans-serif;font-weight:700;font-size:.98rem;
    line-height:1.15;min-width:0;overflow-wrap:break-word;word-break:break-word;
    -webkit-hyphens:auto;hyphens:auto}
  .tile .a{color:var(--red);font-weight:700;font-size:1.1rem}
  .tile.full{grid-column:1 / -1}
  /* Pavé avec image en haut (styleImage "grande") */
  .tile.img-grande{flex-direction:column;align-items:stretch;padding:0;overflow:hidden}
  .tile.img-grande .tile-img{width:100%;height:96px;object-fit:cover;display:block}
  .tile.img-grande .tile-txt{display:flex;align-items:center;justify-content:space-between;
    gap:6px;padding:12px;min-width:0;min-height:46px}
  /* Pavé avec petite vignette à gauche (styleImage "vignette") */
  .tile .vign{width:46px;height:46px;border-radius:10px;object-fit:cover;flex:none;margin-right:10px}
  .tile .tile-left{display:flex;align-items:center;min-width:0;flex:1}
  .tile .a{flex:none}

  /* --- Galerie photos --- */
  .gal{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .gal.c2{grid-template-columns:repeat(2,1fr)}
  .gal.c4{grid-template-columns:repeat(4,1fr)}
  .gal .ph{display:block;background:var(--paper);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;text-decoration:none}
  .gal .ph:active{border-color:var(--red)}
  .gal .ph img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
  .gal .cap{display:block;padding:6px 8px;font-size:.75rem;color:var(--muted);
    text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gal-btn{display:block;margin-top:10px;text-align:center;text-decoration:none;
    border:1px solid var(--line);background:var(--paper);border-radius:12px;
    padding:12px;font-weight:600;font-size:.9rem}
  .gal-btn:active{border-color:var(--red)}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .row{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;
    text-decoration:none;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .row:active{background:var(--surface)}
  .row .ico{font-size:1.15rem;line-height:1.3;width:22px;text-align:center;flex:none}
  .row .main{flex:1;min-width:0}
  .row .k{font-weight:600;font-size:.95rem}
  .row .v{font-size:.85rem;color:var(--muted)}

  .links{display:flex;gap:10px;flex-wrap:wrap}
  .chip{flex:1;min-width:140px;text-align:center;text-decoration:none;
    border:1px solid var(--line);background:var(--paper);border-radius:12px;
    padding:12px;font-weight:600;font-size:.9rem}
  .chip:active{border-color:var(--red)}

  footer{margin-top:26px;text-align:center;font-size:.78rem;color:var(--muted)}
  footer a{color:var(--red);font-weight:600}

  .install{position:sticky;bottom:0;margin-top:22px;background:var(--ink);color:#fff;
    border-radius:14px;padding:12px 14px;display:none;align-items:center;gap:10px;font-size:.86rem}
  .install b{color:#fff}
  .install button{margin-left:auto;background:var(--red);color:#fff;border:0;
    font-family:"Archivo",sans-serif;font-weight:700;border-radius:999px;padding:9px 16px;min-height:40px}
  .install .x{background:transparent;padding:8px;min-height:auto;font-size:1rem;color:#bbb}

  a:focus-visible,button:focus-visible,.tile:focus-visible,.row:focus-visible{
    outline:3px solid var(--red);outline-offset:2px;border-radius:12px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <header class="hero">
    <div class="streaks" aria-hidden="true"><i></i><i></i><i></i></div>
    <div class="hero-inner" id="heroInner"></div>
  </header>

  <div class="wrap">
    <div id="contenu"></div>

    <div class="install" id="installBar">
      <span id="installTxt"><b>Installer l'application</b></span>
      <button id="installBtn" type="button">Installer</button>
      <button class="x" id="installClose" type="button" aria-label="Fermer">✕</button>
    </div>

    <footer id="pied"></footer>
    <noscript>Cette application nécessite JavaScript. Rendez-vous sur ping2belleville.net</noscript>
  </div>

<!-- Chargement du fichier de paramétrage -->
<script src="config.js"></script>

<!-- ⛔ MOTEUR DE L'APPLICATION — NE PAS MODIFIER -->
<script>
(function(){
  var C = window.EPBC_CONFIG || {};
  function esc(t){ return String(t==null?"":t)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function has(v){ return typeof v==="string" && v.trim()!==""; }

  /* Couleurs personnalisables */
  var col=C.couleurs||{}, rs=document.documentElement.style;
  if(has(col.rouge)){ rs.setProperty("--red",col.rouge);
    var mt=document.getElementById("metaTheme"); if(mt) mt.setAttribute("content",col.rouge); }
  if(has(col.noir))  rs.setProperty("--ink",col.noir);
  if(has(col.fond))  rs.setProperty("--surface",col.fond);
  if(has(col.carte)) rs.setProperty("--paper",col.carte);
  if(has(col.trait)) rs.setProperty("--line",col.trait);
  if(has(col.grise)) rs.setProperty("--muted",col.grise);
  if(has(C.titreOnglet)) document.title=C.titreOnglet;

  /* En-tête */
  var b=C.banniere||{}, hero=document.getElementById("heroInner");
  if(has(b.image)){
    var img='<img class="banner" src="'+esc(b.image)+'" alt="'+esc(b.alt||"")+'">';
    hero.innerHTML = has(b.lien) ? '<a href="'+esc(b.lien)+'" style="display:block;width:100%">'+img+'</a>' : img;
  }

  var out="";

  /* À la une */
  var a=C.alaune||{};
  if(a.afficher!==false && (has(a.titre)||has(a.image))){
    var inner="";
    if(has(a.image)) inner+='<img class="flash-img" src="'+esc(a.image)+'" alt="'+esc(a.imageAlt||"")+'">';
    var body="";
    if(has(a.jour)) body+='<div class="date">'+esc(a.jour)+'<small>'+esc(a.mois||"")+'</small></div>';
    body+='<div class="txt"><strong>'+esc(a.titre||"")+'</strong><span>'+esc(a.detail||"")+'</span></div>';
    inner+='<div class="flash-body">'+body+'</div>';
    out+='<section aria-label="'+esc(a.titreSection||"À la une")+'">'
       + (has(a.titreSection)?'<p class="lbl">'+esc(a.titreSection)+'</p>':'')
       + (has(a.lien) ? '<a class="flash" href="'+esc(a.lien)+'">'+inner+'</a>'
                      : '<div class="flash">'+inner+'</div>')
       + '</section>';
  }

  /* Le club */
  var cl=C.club||{};
  if(cl.afficher!==false && cl.paves && cl.paves.length){
    var g="";
    var styleImg = (cl.styleImage==="vignette") ? "vignette" : "grande";
    cl.paves.forEach(function(p){
      if(!p||!has(p.texte)) return;
      var img = has(p.image) ? p.image : "";
      var cls = "tile" + (p.large?" full":"");
      var corps;
      if(img && styleImg==="grande" && !p.large){
        cls += " img-grande";
        corps = '<img class="tile-img" src="'+esc(img)+'" alt="" loading="lazy">'
              + '<span class="tile-txt"><span class="t">'+esc(p.texte)+'</span>'
              + '<span class="a">&rarr;</span></span>';
      } else if(img){
        corps = '<span class="tile-left"><img class="vign" src="'+esc(img)+'" alt="" loading="lazy">'
              + '<span class="t">'+esc(p.texte)+'</span></span><span class="a">&rarr;</span>';
      } else {
        corps = '<span class="t">'+esc(p.texte)+'</span><span class="a">&rarr;</span>';
      }
      g+='<a class="'+cls+'" href="'+esc(p.lien||"#")+'">'+corps+'</a>';
    });
    out+='<section aria-label="'+esc(cl.titreSection||"Le club")+'">'
       + (has(cl.titreSection)?'<p class="lbl">'+esc(cl.titreSection)+'</p>':'')
       + '<div class="grid">'+g+'</div></section>';
  }

  /* Galerie photos */
  var ga=C.galerie||{};
  if(ga.afficher!==false && ga.photos && ga.photos.length){
    var ph="";
    ga.photos.forEach(function(x){
      if(!x||!has(x.image)) return;
      var vis='<img src="'+esc(x.image)+'" alt="'+esc(x.legende||"")+'" loading="lazy">'
            + (has(x.legende)?'<span class="cap">'+esc(x.legende)+'</span>':'');
      ph += has(x.lien) ? '<a class="ph" href="'+esc(x.lien)+'">'+vis+'</a>'
                        : '<span class="ph">'+vis+'</span>';
    });
    if(ph){
      var nc = (ga.colonnes==2||ga.colonnes==="2") ? " c2"
             : (ga.colonnes==4||ga.colonnes==="4") ? " c4" : "";
      out+='<section aria-label="'+esc(ga.titreSection||"Galerie photos")+'">'
         + (has(ga.titreSection)?'<p class="lbl">'+esc(ga.titreSection)+'</p>':'')
         + '<div class="gal'+nc+'">'+ph+'</div>'
         + (has(ga.boutonTexte)&&has(ga.boutonLien)
            ? '<a class="gal-btn" href="'+esc(ga.boutonLien)+'">'+esc(ga.boutonTexte)+'</a>' : '')
         + '</section>';
    }
  }

  /* Infos pratiques */
  var inf=C.infos||{};
  if(inf.afficher!==false && inf.lignes && inf.lignes.length){
    var r="";
    inf.lignes.forEach(function(l){
      if(!l||!has(l.titre)) return;
      r+='<a class="row" href="'+esc(l.lien||"#")+'">'
       + '<span class="ico">'+esc(l.icone||"")+'</span>'
       + '<span class="main"><span class="k">'+esc(l.titre)+'&nbsp;&nbsp;</span>'
       + '<span class="v">'+esc(l.detail||"")+'</span></span></a>';
    });
    out+='<section aria-label="'+esc(inf.titreSection||"Infos pratiques")+'">'
       + (has(inf.titreSection)?'<p class="lbl">'+esc(inf.titreSection)+'</p>':'')
       + '<div class="card">'+r+'</div></section>';
  }

  /* Liens */
  var li=C.liens||{};
  if(li.afficher!==false && li.boutons && li.boutons.length){
    var c="";
    li.boutons.forEach(function(x){
      if(!x||!has(x.texte)) return;
      c+='<a class="chip" href="'+esc(x.lien||"#")+'">'+esc(x.texte)+'</a>';
    });
    out+='<section aria-label="'+esc(li.titreSection||"Liens")+'">'
       + (has(li.titreSection)?'<p class="lbl">'+esc(li.titreSection)+'</p>':'')
       + '<div class="links">'+c+'</div></section>';
  }

  document.getElementById("contenu").innerHTML=out;

  /* Pied de page */
  var p=C.piedDePage||{};
  if(p.afficher===true){
    document.getElementById("pied").innerHTML =
      esc(p.texte||"")+(has(p.lien)?'<a href="'+esc(p.lien)+'">'+esc(p.lienTexte||p.lien)+'</a>':"");
  }
})();

/* Service worker + installation */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
}
var deferred=null, bar=document.getElementById("installBar"),
    btn=document.getElementById("installBtn"), txt=document.getElementById("installTxt"),
    closeBtn=document.getElementById("installClose");
var standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); deferred=e;
  if(!standalone){ txt.innerHTML="<b>Installer l'application</b>"; btn.style.display=""; bar.style.display="flex"; }
});
btn.addEventListener("click", function(){
  if(deferred){ deferred.prompt(); deferred.userChoice.finally(function(){ deferred=null; bar.style.display="none"; }); }
});
closeBtn.addEventListener("click", function(){ bar.style.display="none"; });
var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS && !standalone){
  txt.innerHTML="<b>Installer :</b> Partager &#x2191; puis « Sur l'écran d'accueil »";
  btn.style.display="none"; bar.style.display="flex";
}
</script>
</body>
</html>
